<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Movie Stream Stats</title>
    <style>
        :root {
            --bg: #0f0f10;
            --surface: #1a1a1c;
            --surface-elevated: #242427;
            --border: #2e2e33;
            --accent: #e50914;
            --accent-soft: rgba(229, 9, 20, 0.15);
            --text: #f5f5f5;
            --text-dim: #9a9aa3;
            --text-muted: #6b6b73;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header.topbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 24px;
            flex-wrap: wrap;
        }
        header.topbar .brand {
            font-weight: 700;
            font-size: 1.15rem;
            color: var(--accent);
            letter-spacing: 0.5px;
        }
        nav {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            flex: 1;
        }
        nav a {
            color: var(--text-dim);
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 0.92rem;
            transition: background 0.15s, color 0.15s;
        }
        nav a:hover { background: var(--surface-elevated); color: var(--text); }
        nav a.active { background: var(--accent-soft); color: var(--accent); }
        .lookup {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .lookup input {
            width: 110px;
            padding: 8px 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--surface-elevated);
            color: var(--text);
            font-size: 0.9rem;
        }
        .lookup input:focus { outline: none; border-color: var(--accent); }
        .lookup button {
            padding: 8px 14px;
            border-radius: 6px;
            border: none;
            background: var(--accent);
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: opacity 0.15s;
        }
        .lookup button:hover { opacity: 0.85; }
        main { flex: 1; padding: 32px 24px; max-width: 1400px; width: 100%; margin: 0 auto; }
        .page-title {
            font-size: 1.6rem;
            margin-bottom: 24px;
            font-weight: 600;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 18px;
            transition: border-color 0.15s, transform 0.15s;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--accent-soft) 0%, transparent 60%);
            opacity: 0.4;
            pointer-events: none;
        }
        .card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }
        .card .rank {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            position: relative;
        }
        .card .title {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 12px;
            position: relative;
        }
        .card .metric {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent);
            position: relative;
        }
        .card .metric-label {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-top: 4px;
            position: relative;
        }
        .card .id {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 8px;
            position: relative;
        }
        .detail {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 28px;
            max-width: 760px;
        }
        .detail h2 { font-size: 1.5rem; margin-bottom: 4px; }
        .detail .meta { color: var(--text-dim); margin-bottom: 24px; font-size: 0.9rem; }
        .detail .total {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 4px;
        }
        .detail .total-label { color: var(--text-dim); margin-bottom: 24px; }
        .breakdown-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 16px;
        }
        .breakdown {
            background: var(--surface-elevated);
            border-radius: 8px;
            padding: 18px;
        }
        .breakdown h3 {
            font-size: 0.85rem;
            color: var(--text-dim);
            font-weight: 500;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .breakdown-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 0.95rem;
        }
        .breakdown-row .label { color: var(--text-dim); }
        .breakdown-row .value { font-weight: 600; }
        .empty, .error {
            text-align: center;
            padding: 48px 16px;
            color: var(--text-dim);
        }
        .error { color: #ff6b6b; }
        @media (max-width: 600px) {
            .breakdown-grid { grid-template-columns: 1fr; }
            header.topbar { padding: 12px 16px; }
            main { padding: 20px 16px; }
        }
    </style>
</head>
<body>

<header class="topbar">
    <div class="brand">🎬 Movie Stream Stats</div>
    <nav>
        <a href="#/stats/ten/best/score" data-route="/stats/ten/best/score">Best Score</a>
        <a href="#/stats/ten/best/views" data-route="/stats/ten/best/views">Best Views</a>
        <a href="#/stats/ten/worst/score" data-route="/stats/ten/worst/score">Worst Score</a>
        <a href="#/stats/ten/worst/views" data-route="/stats/ten/worst/views">Worst Views</a>
    </nav>
    <div class="lookup">
        <input id="movieId" type="number" min="1" placeholder="Movie ID">
        <button id="lookupBtn">Lookup</button>
    </div>
</header>

<main>
    <h1 id="pageTitle" class="page-title">Loading…</h1>
    <div id="content"></div>
</main>

<script>
    const ROUTE_LABELS = {
        '/stats/ten/best/score':  { title: 'Top 10 — Best Score',   metric: 'score' },
        '/stats/ten/best/views':  { title: 'Top 10 — Most Watched', metric: 'views' },
        '/stats/ten/worst/score': { title: 'Top 10 — Worst Score',  metric: 'score' },
        '/stats/ten/worst/views': { title: 'Top 10 — Least Watched', metric: 'views' }
    };

    const navLinks  = document.querySelectorAll('nav a[data-route]');
    const idInput   = document.getElementById('movieId');
    const lookupBtn = document.getElementById('lookupBtn');
    const titleEl   = document.getElementById('pageTitle');
    const contentEl = document.getElementById('content');

    function setActive(route) {
        navLinks.forEach(a => a.classList.toggle('active', a.dataset.route === route));
    }

    function renderRanking(items, route) {
        const meta = ROUTE_LABELS[route];
        if (!items.length) {
            contentEl.innerHTML = '<div class="empty">No data yet — wait for the stream to receive events.</div>';
            return;
        }
        const cards = items.map((item, idx) => {
            const value = meta.metric === 'score'
                ? Number(item.score).toFixed(2)
                : item.views.toLocaleString();
            const label = meta.metric === 'score' ? 'Average score' : 'Total views';
            return `
                <div class="card">
                    <div class="rank">#${idx + 1}</div>
                    <div class="title">${escapeHtml(item.title)}</div>
                    <div class="metric">${value}</div>
                    <div class="metric-label">${label}</div>
                    <div class="id">Movie ID · ${item.id}</div>
                </div>`;
        }).join('');
        contentEl.innerHTML = `<div class="grid">${cards}</div>`;
    }

    function renderDetail(movie) {
        const past = movie.stats.past;
        const recent = movie.stats.last_five_minutes;
        contentEl.innerHTML = `
            <div class="detail">
                <h2>${escapeHtml(movie.title)}</h2>
                <div class="meta">Movie ID · ${movie.id}</div>
                <div class="total">${movie.total_view_count.toLocaleString()}</div>
                <div class="total-label">Total views since launch</div>
                <div class="breakdown-grid">
                    <div class="breakdown">
                        <h3>All-time breakdown</h3>
                        ${breakdownRow('Start only (≤10%)', past.start_only)}
                        ${breakdownRow('Half (10–90%)',     past.half)}
                        ${breakdownRow('Full (≥90%)',       past.full)}
                    </div>
                    <div class="breakdown">
                        <h3>Last 5 minutes</h3>
                        ${breakdownRow('Start only (≤10%)', recent.start_only)}
                        ${breakdownRow('Half (10–90%)',     recent.half)}
                        ${breakdownRow('Full (≥90%)',       recent.full)}
                    </div>
                </div>
            </div>`;
    }

    function breakdownRow(label, value) {
        return `<div class="breakdown-row"><span class="label">${label}</span><span class="value">${value.toLocaleString()}</span></div>`;
    }

    function escapeHtml(str) {
        return String(str).replace(/[&<>"']/g, ch => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[ch]));
    }

    function showError(message) {
        contentEl.innerHTML = `<div class="error">⚠️ ${escapeHtml(message)}</div>`;
    }

    async function loadRanking(route) {
        setActive(route);
        titleEl.textContent = ROUTE_LABELS[route].title;
        try {
            const res = await fetch(route);
            if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
            renderRanking(await res.json(), route);
        } catch (e) {
            showError(e.message);
        }
    }

    async function loadMovie(id) {
        setActive('');
        titleEl.textContent = `Movie #${id}`;
        try {
            const res = await fetch(`/movies/${id}`);
            if (res.status === 404) {
                showError(`No data for movie ${id} yet.`);
                return;
            }
            if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
            renderDetail(await res.json());
        } catch (e) {
            showError(e.message);
        }
    }

    function handleHash() {
        const hash = location.hash.slice(1) || '/stats/ten/best/score';
        const movieMatch = hash.match(/^\/movies\/(\d+)$/);
        if (movieMatch) {
            loadMovie(movieMatch[1]);
        } else if (ROUTE_LABELS[hash]) {
            loadRanking(hash);
        } else {
            location.hash = '/stats/ten/best/score';
        }
    }

    navLinks.forEach(a => a.addEventListener('click', e => {
        e.preventDefault();
        location.hash = a.dataset.route;
    }));

    lookupBtn.addEventListener('click', () => {
        const id = idInput.value.trim();
        if (id) location.hash = `/movies/${id}`;
    });

    idInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') lookupBtn.click();
    });

    window.addEventListener('hashchange', handleHash);
    window.addEventListener('DOMContentLoaded', handleHash);
</script>
</body>
</html>
